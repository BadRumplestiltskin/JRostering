# =============================================================================
# JRostering — Development Profile
# =============================================================================
# Activated via: spring.profiles.active=dev
# Provides relaxed settings for local development.
# =============================================================================

# More verbose SQL logging during development
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.magicsystems.jrostering=DEBUG
logging.level.ai.timefold=INFO

# Faster Timefold solve for dev (comment out for realistic timing)
# timefold.solver.termination.spent-limit=PT10S

# Show full health details without authentication in dev
management.endpoint.health.show-details=always
