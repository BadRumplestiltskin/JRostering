# =============================================================================
# JRostering — Application Configuration
# =============================================================================
# Update datasource credentials before running. All other defaults are
# appropriate for both server and single-PC deployment modes.
# =============================================================================

# -----------------------------------------------------------------------------
# DataSource — PostgreSQL 16.x
# -----------------------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/jrostering}
spring.datasource.username=${DB_USERNAME:jrostering}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# -----------------------------------------------------------------------------
# JPA / Hibernate 6
# validate: Hibernate checks that the schema matches the entities but does not
# modify it. Flyway owns all DDL changes.
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# -----------------------------------------------------------------------------
# Flyway — schema migration
# Migrations are read from classpath:db/migration and applied automatically
# on startup before the application context finishes initialising.
# -----------------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# -----------------------------------------------------------------------------
# Timefold Solver
# No global termination is set here — the time limit is configured per solve
# job by the manager at submission time and applied programmatically in
# SolverService. The thread count defaults to the number of available CPUs.
# -----------------------------------------------------------------------------
timefold.solver.environment-mode=REPRODUCIBLE

# -----------------------------------------------------------------------------
# Vaadin 24
# -----------------------------------------------------------------------------
vaadin.heartbeatInterval=300
vaadin.closeIdleSessions=true

# -----------------------------------------------------------------------------
# Server
# -----------------------------------------------------------------------------
server.port=8080
server.servlet.session.timeout=30m

# -----------------------------------------------------------------------------
# Virtual threads (Java 21+)
# Allows Tomcat to use virtual threads for request handling, improving throughput
# under high concurrency without tuning thread pool sizes.
# -----------------------------------------------------------------------------
spring.threads.virtual.enabled=true

# -----------------------------------------------------------------------------
# Async executor — used by SolverService for background solve runs.
# core-size and max-size are intentionally conservative; the Timefold solver
# itself manages CPU utilisation internally.
# -----------------------------------------------------------------------------
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
spring.task.execution.pool.queue-capacity=10
spring.task.execution.thread-name-prefix=solver-

# -----------------------------------------------------------------------------
# Spring Boot Actuator
# Only health, info, and metrics are exposed over HTTP. Other endpoints (env,
# beans, etc.) remain accessible only via JMX or not at all.
#
# Liveness probe:  GET /actuator/health/liveness
# Readiness probe: GET /actuator/health/readiness
# Both paths are used by the Kubernetes probe configuration in README.md.
# -----------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.info.env.enabled=true
info.app.name=JRostering
info.app.description=Universal Staff Rostering Application

# -----------------------------------------------------------------------------
# Springdoc OpenAPI — Swagger UI available at /swagger-ui.html (auth required)
# Scoped to the REST API package only; Vaadin UI paths are excluded.
# -----------------------------------------------------------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.magicsystems.jrostering.api
springdoc.paths-to-match=/api/**

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging.level.com.magicsystems.jrostering=INFO
logging.level.ai.timefold=WARN
logging.level.org.flywaydb=INFO
logging.level.org.hibernate.SQL=WARN
