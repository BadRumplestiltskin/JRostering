# =============================================================================
# JRostering — Test Profile
# =============================================================================
# Activated automatically by @SpringBootTest when spring.profiles.active=test
# or when the test class declares @ActiveProfiles("test").
# =============================================================================

# Flyway runs on the Testcontainers-managed schema to create tables and seed data
spring.flyway.enabled=true

# Use a deterministic seed for reproducible solver output in tests
timefold.solver.environment-mode=REPRODUCIBLE

# Suppress most solver logging in tests
logging.level.ai.timefold=WARN
logging.level.com.magicsystems.jrostering=WARN
