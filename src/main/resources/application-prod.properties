# =============================================================================
# JRostering — Production Profile
# =============================================================================
# Activated via: SPRING_PROFILES_ACTIVE=prod (environment variable)
# All secrets must be supplied via environment variables — never hardcoded.
# =============================================================================

# Require HTTPS — configure a reverse proxy (nginx/Caddy) to terminate TLS
# and forward on localhost; set server.port accordingly.
server.port=8443

# Minimal logging in production
logging.level.com.magicsystems.jrostering=INFO
logging.level.ai.timefold=WARN
logging.level.org.flywaydb=INFO
logging.level.org.hibernate.SQL=WARN

# Health details only visible to authenticated users
management.endpoint.health.show-details=when-authorized

# Longer session timeout for production shifts (managers may be on shift all day)
server.servlet.session.timeout=8h
