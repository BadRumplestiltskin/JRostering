version: "3.9"

services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       jrostering
      POSTGRES_USER:     jrostering
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jrostering"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL:      jdbc:postgresql://db:5432/jrostering
      DB_USERNAME: jrostering
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
